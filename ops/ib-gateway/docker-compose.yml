services:
  ib-gateway:
    image: ghcr.io/gnzsnz/ib-gateway:10.45.1f
    restart: unless-stopped
    environment:
      TWS_USERID: ${TWS_USERID}
      TWS_PASSWORD_FILE: /run/secrets/tws_password
      TRADING_MODE: ${TRADING_MODE:-paper}
      READ_ONLY_API: ${READ_ONLY_API:-yes}
      TWOFA_TIMEOUT_ACTION: ${TWOFA_TIMEOUT_ACTION:-exit}
      TWOFA_DEVICE: ${TWOFA_DEVICE:-}
      AUTO_RESTART_TIME: ${AUTO_RESTART_TIME:-11:45 PM}
      RELOGIN_AFTER_TWOFA_TIMEOUT: ${RELOGIN_AFTER_TWOFA_TIMEOUT:-no}
      EXISTING_SESSION_DETECTED_ACTION: ${EXISTING_SESSION_DETECTED_ACTION:-primary}
      TIME_ZONE: America/New_York
    ports:
      - "127.0.0.1:4001:4001"
      - "127.0.0.1:4002:4002"
    secrets:
      - tws_password
    volumes:
      - ib_gateway_settings:/home/ibgateway/Jts

secrets:
  tws_password:
    file: ./secrets/tws_password.txt

volumes:
  ib_gateway_settings:
