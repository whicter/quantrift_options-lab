name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  server:
    name: Server tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
        working-directory: server
      - run: npm test
        working-directory: server

  frontend:
    name: Frontend lint, tests and production artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run lint -- --max-warnings=0
        working-directory: frontend
      - run: npm test
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
      # Asserts the artifact itself: no source maps, no provider secrets.
      # vite.config.js sets build.sourcemap=false, but the gate must not
      # trust the setting.
      - run: npm run check:dist
        working-directory: frontend

  collector:
    name: Collector tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: collector/requirements.txt
      - run: pip install -r requirements.txt
        working-directory: collector
      # Must not read a developer .env or reach any provider.
      - run: python -m unittest discover -s tests
        working-directory: collector
        env:
          TT_LOGIN: ''
          DATABASE_URL: ''

  secrets:
    name: No committed secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan tracked files for provider credentials
        run: bash scripts/scan-secrets.sh
